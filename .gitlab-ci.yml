stages:
  - build
  - release

variables:
  APP_VERSION: "1.0.0"
  PROJECT_NAME: "PandaTools"

build:
  stage: build
  tags:
    - windows          # your Windows shell runner tag
  script:
    # Ensure dotnet is on PATH for the runner service
    - $env:PATH = "C:\Program Files\dotnet;$env:PATH"

    # 1. Publish main app (.csproj is in repo root, not PandaTools/)
    - dotnet restore PandaTools.csproj
    - dotnet publish PandaTools.csproj `
        --configuration Release `
        --runtime win-x64 `
        --self-contained true `
        -p:PublishSingleFile=true `
        -p:IncludeNativeLibrariesForSelfExtract=true `
        -p:DebugType=none `
        -p:DebugSymbols=false `
        -p:Version=$env:APP_VERSION `
        --output ./payload_staging

    # 2. Zip the payload so the installer can embed it (PowerShell Compress-Archive on Windows)
    - if (Test-Path "PandaTools.Setup/Payload") { Remove-Item "PandaTools.Setup/Payload" -Recurse -Force }
    - New-Item -ItemType Directory -Path "PandaTools.Setup/Payload" | Out-Null
    - Compress-Archive -Path "./payload_staging/*" -DestinationPath "./PandaTools.Setup/Payload/payload.zip" -Force

    # 3. Build the installer exe (embeds payload.zip)
    - dotnet restore PandaTools.Setup/PandaTools.Setup.csproj
    - dotnet publish PandaTools.Setup/PandaTools.Setup.csproj `
        --configuration Release `
        --runtime win-x64 `
        --self-contained true `
        -p:PublishSingleFile=true `
        -p:IncludeNativeLibrariesForSelfExtract=true `
        -p:DebugType=none `
        -p:DebugSymbols=false `
        -p:Version=$env:APP_VERSION `
        --output ./installer_out

  artifacts:
    name: "$PROJECT_NAME-Setup-$CI_COMMIT_TAG"
    paths:
      - installer_out/PandaToolsSetup.exe
    expire_in: 90 days
  rules:
    - if: $CI_COMMIT_TAG

release:
  stage: release
  tags:
    - windows
  needs:
    - job: build
      artifacts: true
  script:
    - |
      $lines = Get-Content CHANGELOG.md
      $capture = $false
      $notes = @()
      foreach ($line in $lines) {
        if ($line -match '^## \[') {
          if ($capture) { break }
          $capture = $true
        }
        if ($capture) { $notes += $line }
      }
      $notes | Set-Content release_notes.txt
  release:
    tag_name:    $CI_COMMIT_TAG
    name:        "$PROJECT_NAME $CI_COMMIT_TAG"
    description: "./release_notes.txt"
    assets:
      links:
        - name:      "PandaToolsSetup.exe"
          url:       "$CI_PROJECT_URL/-/jobs/artifacts/$CI_COMMIT_TAG/raw/installer_out/PandaToolsSetup.exe?job=build"
          link_type: package
  rules:
    - if: $CI_COMMIT_TAG
