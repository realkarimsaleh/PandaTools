stages:
  - build
  - release

variables:
  APP_VERSION: "3.0.0"
  PROJECT_NAME: "PandaTools"

build:
  stage: build
  tags:
    - windows
  script:
    - $env:PATH = "C:\Program Files\dotnet;$env:PATH"

    # 1. ALWAYS get a clean version number (e.g., "3.0.0" whether tagged "v3.0.0" or "3.0.0")
    - $cleanVersion = if ($env:CI_COMMIT_TAG) { $env:CI_COMMIT_TAG.TrimStart("v") } else { $env:APP_VERSION }
    - Write-Host "Clean version for build: $cleanVersion"

    - dotnet restore PandaTools.csproj

    - |
      dotnet publish PandaTools.csproj `
        --configuration Release `
        --runtime win-x64 `
        --self-contained true `
        -p:PublishSingleFile=true `
        -p:IncludeNativeLibrariesForSelfExtract=true `
        -p:DebugType=none `
        -p:DebugSymbols=false `
        -p:Version=$cleanVersion `
        -p:GitLabUrl=$env:CI_SERVER_URL `
        -p:GitLabProjectId=$env:CI_PROJECT_ID `
        -p:GitLabRepoPath=$env:CI_PROJECT_PATH `
        --output ./payload_staging

    - if (Test-Path "PandaTools.Setup/Payload") { Remove-Item "PandaTools.Setup/Payload" -Recurse -Force }
    - New-Item -ItemType Directory -Path "PandaTools.Setup/Payload" | Out-Null
    - Compress-Archive -Path "./payload_staging/*" -DestinationPath "./PandaTools.Setup/Payload/payload.zip" -Force

    - dotnet restore PandaTools.Setup/PandaTools.Setup.csproj
    
    - |
      dotnet publish PandaTools.Setup/PandaTools.Setup.csproj `
        --configuration Release `
        --runtime win-x64 `
        --self-contained true `
        -p:PublishSingleFile=true `
        -p:IncludeNativeLibrariesForSelfExtract=true `
        -p:DebugType=none `
        -p:DebugSymbols=false `
        -p:Version=$cleanVersion `
        --output ./installer_out

    # 2. FORCE the 'v' right here when naming the file
    - $exeName = "PandaToolsSetup-v$cleanVersion.exe"
    - Move-Item -Path "./installer_out/PandaToolsSetup.exe" -Destination "./$exeName" -Force
    - Write-Host "Created Installer: $exeName"

  artifacts:
    name: "${PROJECT_NAME}-Setup-${CI_COMMIT_TAG}"
    paths:
      # 3. We can safely go back to explicitly looking for the 'v'
      - PandaToolsSetup-v*.exe
    expire_in: 90 days
  rules:
    - if: $CI_COMMIT_TAG

release:
  stage: release
  tags:
    - windows
  needs:
    - job: build
      artifacts: true
  script:
    - |
      if ([string]::IsNullOrWhiteSpace($env:GITLAB_API_TOKEN)) {
        throw "GITLAB_API_TOKEN is not set or not visible to this job."
      }

      $headers      = @{ "PRIVATE-TOKEN" = $env:GITLAB_API_TOKEN }
      $apiBase      = "$env:CI_API_V4_URL/projects/$env:CI_PROJECT_ID"
      
      # 4. Strip the 'v' from the tag if it exists, then force our own 'v' onto the exe name
      $cleanVersion = $env:CI_COMMIT_TAG.TrimStart("v")
      $exeName      = "PandaToolsSetup-v$cleanVersion.exe"
      
      $packageName  = "pandatools-installer"

      Write-Host "API Base:    $apiBase"
      Write-Host "Tag:         $env:CI_COMMIT_TAG"
      Write-Host "Exe target:  $exeName"

      # Parse CHANGELOG.md for latest version notes
      $lines = Get-Content CHANGELOG.md
      $capture = $false
      $notes = @()
      foreach ($line in $lines) {
        if ($line -match '^## \[') {
          if ($capture) { break }
          $capture = $true
        }
        if ($capture) { $notes += $line }
      }
      $releaseNotes = ($notes -join "`n").Trim()
      if (-not $releaseNotes) { $releaseNotes = "Release $env:CI_COMMIT_TAG" }

      # Verify exe exists
      if (-not (Test-Path $exeName)) {
        Get-ChildItem | Select-Object Name, Length
        throw "EXE not found: $exeName. Check if the artifact was passed correctly."
      }
      Write-Host "Found exe: $exeName ($((Get-Item $exeName).Length) bytes)"

      # Upload via Generic Packages API
      $uploadUrl = "$apiBase/packages/generic/$packageName/$cleanVersion/$exeName"
      Write-Host "Uploading to: $uploadUrl"

      Add-Type -AssemblyName System.Net.Http
      $client = [System.Net.Http.HttpClient]::new()
      $client.Timeout = [System.TimeSpan]::FromMinutes(10)
      $client.DefaultRequestHeaders.Add("PRIVATE-TOKEN", $env:GITLAB_API_TOKEN)
      $fs      = [System.IO.File]::OpenRead((Resolve-Path $exeName))
      $content = [System.Net.Http.StreamContent]::new($fs)
      $resp    = $client.PutAsync($uploadUrl, $content).GetAwaiter().GetResult()
      $body    = $resp.Content.ReadAsStringAsync().GetAwaiter().GetResult()
      $fs.Close()
      $client.Dispose()

      Write-Host "Upload status: $($resp.StatusCode)"
      if (-not $resp.IsSuccessStatusCode) {
        throw "Upload failed: $($resp.StatusCode) - $body"
      }

      $exeUrl = "$apiBase/packages/generic/$packageName/$cleanVersion/$exeName"

      # Delete existing release if present
      try {
        Invoke-RestMethod `
          -Uri     "$apiBase/releases/$($env:CI_COMMIT_TAG)" `
          -Method  Delete `
          -Headers $headers `
          -ErrorAction Stop
        Write-Host "Deleted existing release $env:CI_COMMIT_TAG"
      } catch {
        Write-Host "No existing release to delete - continuing"
      }

      # Create the release with exe linked from package registry
      $payload = @{
        tag_name    = $env:CI_COMMIT_TAG
        name        = "PandaTools $env:CI_COMMIT_TAG"
        description = $releaseNotes
        assets      = @{
          links = @(@{
            name      = $exeName
            url       = $exeUrl
            filepath  = "/$exeName" 
            link_type = "package"
          })
        }
      } | ConvertTo-Json -Depth 5

      Invoke-RestMethod `
        -Uri         "$apiBase/releases" `
        -Method      Post `
        -Headers     $headers `
        -Body        $payload `
        -ContentType "application/json"

      Write-Host "Release $env:CI_COMMIT_TAG created successfully."
      Write-Host "Download: $exeUrl"
  rules:
    - if: $CI_COMMIT_TAG