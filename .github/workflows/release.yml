name: Build and Release

on:
  push:
    tags:
      - 'v*'

env:
  APP_VERSION: "3.0.0"

jobs:
  build-and-release:
    runs-on: self-hosted
    permissions:
      contents: write   

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Derive version from tag
        id: version
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $v   = if ($tag -and $tag -ne "") { $tag.TrimStart("v") } else { "${{ env.APP_VERSION }}" }
          echo "VERSION=$v" >> $env:GITHUB_OUTPUT
          Write-Host "Building version: $v"

      - name: Build main app
        shell: pwsh
        run: |
          $env:PATH = "C:\Program Files\dotnet;$env:PATH"
          dotnet restore PandaTools.csproj
          dotnet publish PandaTools.csproj `
            --configuration Release `
            --runtime win-x64 `
            --self-contained true `
            -p:PublishSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -p:DebugType=none `
            -p:DebugSymbols=false `
            -p:Version=${{ steps.version.outputs.VERSION }} `
            -p:CfgPlatform="github" `
            -p:CfgRepoOwner="${{ github.repository_owner }}" `
            -p:CfgRepoName="pandatools-config" `
            -p:AppPlatform="github" `
            -p:AppUrlServer="https://github.com" `
            -p:GitHubRepoOwner="${{ github.repository_owner }}" `
            -p:GitHubRepoName="${{ github.event.repository.name }}" `
            --output ./payload_staging

      - name: Bundle payload
        shell: pwsh
        run: |
          if (Test-Path "PandaTools.Setup/Payload") { Remove-Item "PandaTools.Setup/Payload" -Recurse -Force }
          New-Item -ItemType Directory -Path "PandaTools.Setup/Payload" | Out-Null
          Compress-Archive -Path "./payload_staging/*" -DestinationPath "./PandaTools.Setup/Payload/payload.zip" -Force

      - name: Build installer
        shell: pwsh
        run: |
          $env:PATH = "C:\Program Files\dotnet;$env:PATH"
          dotnet restore PandaTools.Setup/PandaTools.Setup.csproj
          dotnet publish PandaTools.Setup/PandaTools.Setup.csproj `
            --configuration Release `
            --runtime win-x64 `
            --self-contained true `
            -p:PublishSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -p:DebugType=none `
            -p:DebugSymbols=false `
            -p:Version=${{ steps.version.outputs.VERSION }} `
            --output ./installer_out
          $exeName = "PandaToolsSetup-${{ github.ref_name }}.exe"
          Move-Item -Path "./installer_out/PandaToolsSetup.exe" -Destination "./$exeName" -Force
          Write-Host "Installer: $exeName ($((Get-Item $exeName).Length) bytes)"

      - name: Parse changelog
        id: changelog
        shell: pwsh
        run: |
          $lines   = Get-Content CHANGELOG.md
          $capture = $false
          $notes   = @()
          foreach ($line in $lines) {
            if ($line -match '^## \[') {
              if ($capture) { break }
              $capture = $true
            }
            if ($capture) { $notes += $line }
          }
          $body = ($notes -join "`n").Trim()
          if (-not $body) { $body = "Release ${{ github.ref_name }}" }
          $body | Out-File -FilePath release_notes.txt -Encoding utf8

      - name: Publish GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $exeName  = "PandaToolsSetup-${{ github.ref_name }}.exe"
          $notes    = Get-Content release_notes.txt -Raw
          $owner    = "${{ github.repository_owner }}"
          $repo     = "${{ github.event.repository.name }}"
          $tag      = "${{ github.ref_name }}"
          $apiBase  = "https://api.github.com/repos/$owner/$repo"
          $headers  = @{
            "Authorization"        = "Bearer $env:GH_TOKEN"
            "Accept"               = "application/vnd.github+json"
            "X-GitHub-Api-Version" = "2022-11-28"
          }

          # Delete existing release on this tag (handles reruns)
          try {
            $existing = Invoke-RestMethod -Uri "$apiBase/releases/tags/$tag" -Headers $headers -ErrorAction Stop
            Invoke-RestMethod -Uri "$apiBase/releases/$($existing.id)" -Method Delete -Headers $headers -ErrorAction Stop
            Write-Host "Deleted existing release $tag"
          } catch {
            Write-Host "No existing release to delete - continuing"
          }

          # Create the release
          $payload = @{
            tag_name   = $tag
            name       = "PandaTools $tag"
            body       = $notes
            draft      = $false
            prerelease = $false
          } | ConvertTo-Json -Depth 3

          $release = Invoke-RestMethod `
            -Uri         "$apiBase/releases" `
            -Method      Post `
            -Headers     $headers `
            -Body        $payload `
            -ContentType "application/json"

          Write-Host "Release created: $($release.html_url)"

          # Upload exe asset
          $uploadUri = $release.upload_url -replace '\{.*\}', "?name=$exeName"
          $uploadHeaders = $headers.Clone()
          $uploadHeaders["Content-Type"] = "application/octet-stream"
          $exeBytes = [System.IO.File]::ReadAllBytes((Resolve-Path $exeName))
          $asset = Invoke-RestMethod `
            -Uri     $uploadUri `
            -Method  Post `
            -Headers $uploadHeaders `
            -Body    $exeBytes

          Write-Host "Asset uploaded: $($asset.browser_download_url)"