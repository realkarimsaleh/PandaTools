stages:
  - build
  - release

variables:
  APP_VERSION: "3.0.0"  
  PROJECT_NAME: "PandaTools"

build:
  stage: build
  tags:
    - windows
  script:
    - $env:PATH = "C:\Program Files\dotnet;$env:PATH"

    ##
    ##Derive version from git tag if present, otherwise fall back to APP_VERSION
    ##
    - $version = if ($env:CI_COMMIT_TAG) { $env:CI_COMMIT_TAG.TrimStart("v") } else { $env:APP_VERSION }
    - Write-Host "Building version: $version"

    - dotnet restore PandaTools.csproj

    ##
    ##All CI_ variables below are injected automatically by GitLab - no setup needed.
    ##CI_SERVER_URL   → PandaTools.GitLabUrl        (config server URL)
    ##CI_PROJECT_ID   → PandaTools.GitLabProjectId  (flavour and defaults polling project)
    ##CI_PROJECT_PATH → PandaTools.GitLabRepoPath   (e.g. service-delivery/pandatools)
    ##CfgPlatform     → "gitlab" (config and flavours live on this GitLab instance)
    ##
    - dotnet publish PandaTools.csproj `
        --configuration Release `
        --runtime win-x64 `
        --self-contained true `
        -p:PublishSingleFile=true `
        -p:IncludeNativeLibrariesForSelfExtract=true `
        -p:DebugType=none `
        -p:DebugSymbols=false `
        -p:Version=$version `
        -p:GitLabUrl=$env:CI_SERVER_URL `
        -p:GitLabProjectId=$env:CI_PROJECT_ID `
        -p:GitLabRepoPath=$env:CI_PROJECT_PATH `
        -p:CfgPlatform="gitlab" `
        -p:CfgRepoOwner="" `
        -p:CfgRepoName="" `
        --output ./payload_staging

    - if (Test-Path "PandaTools.Setup/Payload") { Remove-Item "PandaTools.Setup/Payload" -Recurse -Force }
    - New-Item -ItemType Directory -Path "PandaTools.Setup/Payload" | Out-Null
    - Compress-Archive -Path "./payload_staging/*" -DestinationPath "./PandaTools.Setup/Payload/payload.zip" -Force

    - dotnet restore PandaTools.Setup/PandaTools.Setup.csproj
    - dotnet publish PandaTools.Setup/PandaTools.Setup.csproj `
        --configuration Release `
        --runtime win-x64 `
        --self-contained true `
        -p:PublishSingleFile=true `
        -p:IncludeNativeLibrariesForSelfExtract=true `
        -p:DebugType=none `
        -p:DebugSymbols=false `
        -p:Version=$version `
        --output ./installer_out

    - $exeName = "PandaToolsSetup-$($env:CI_COMMIT_TAG ?? "v$version").exe"
    - Move-Item -Path "./installer_out/PandaToolsSetup.exe" -Destination "./$exeName" -Force
    - Write-Host "Installer: $exeName ($((Get-Item $exeName).Length) bytes)"

  artifacts:
    name: "${PROJECT_NAME}-Setup-${CI_COMMIT_TAG}"
    paths:
      - PandaToolsSetup-v*.exe
    ##
    ##1 day expiry - artifacts are only a bridge between build and release jobs.
    ##The permanent copy lives in the GitLab Generic Packages registry.
    ##Short expiry avoids accumulating storage on GitLab over time.
    ##
    expire_in: 1 day
  rules:
    - if: $CI_COMMIT_TAG

release:
  stage: release
  tags:
    - windows
  needs:
    - job: build
      artifacts: true
  script:
    - |
      if ([string]::IsNullOrWhiteSpace($env:GITLAB_API_TOKEN)) {
        throw "GITLAB_API_TOKEN is not set or not visible to this job."
      }

      $headers     = @{ "PRIVATE-TOKEN" = $env:GITLAB_API_TOKEN }
      $apiBase     = "$env:CI_API_V4_URL/projects/$env:CI_PROJECT_ID"
      $version     = $env:CI_COMMIT_TAG.TrimStart("v")
      $exeName     = "PandaToolsSetup-$($env:CI_COMMIT_TAG).exe"
      $packageName = "pandatools-installer"

      Write-Host "API Base: $apiBase"
      Write-Host "Tag:      $env:CI_COMMIT_TAG"
      Write-Host "Exe:      $exeName"

      # Parse CHANGELOG.md for the latest version notes
      $lines = Get-Content CHANGELOG.md
      $capture = $false
      $notes = @()
      foreach ($line in $lines) {
        if ($line -match '^## \[') {
          if ($capture) { break }
          $capture = $true
        }
        if ($capture) { $notes += $line }
      }
      $releaseNotes = ($notes -join "`n").Trim()
      if (-not $releaseNotes) { $releaseNotes = "Release $env:CI_COMMIT_TAG" }

      # Verify exe exists
      if (-not (Test-Path $exeName)) {
        Get-ChildItem | Select-Object Name, Length
        throw "EXE not found: $exeName"
      }
      Write-Host "Found exe: $exeName ($((Get-Item $exeName).Length) bytes)"

      # ######################################
      # GitLab: upload to Generic Packages API
      # Stored permanently in package registry - not subject to artifact expiry
      # ######################################
      $uploadUrl = "$apiBase/packages/generic/$packageName/$version/$exeName"
      Write-Host "Uploading to GitLab packages: $uploadUrl"

      Add-Type -AssemblyName System.Net.Http
      $client = [System.Net.Http.HttpClient]::new()
      $client.Timeout = [System.TimeSpan]::FromMinutes(10)
      $client.DefaultRequestHeaders.Add("PRIVATE-TOKEN", $env:GITLAB_API_TOKEN)
      $fs      = [System.IO.File]::OpenRead((Resolve-Path $exeName))
      $content = [System.Net.Http.StreamContent]::new($fs)
      $resp    = $client.PutAsync($uploadUrl, $content).GetAwaiter().GetResult()
      $body    = $resp.Content.ReadAsStringAsync().GetAwaiter().GetResult()
      $fs.Close()
      $client.Dispose()

      Write-Host "GitLab upload status: $($resp.StatusCode)"
      if (-not $resp.IsSuccessStatusCode) {
        throw "GitLab upload failed: $($resp.StatusCode) - $body"
      }

      $exeUrl = "$apiBase/packages/generic/$packageName/$version/$exeName"

      # Delete existing GitLab release on this tag (handles reruns)
      try {
        Invoke-RestMethod `
          -Uri         "$apiBase/releases/$($env:CI_COMMIT_TAG)" `
          -Method      Delete `
          -Headers     $headers `
          -ErrorAction Stop
        Write-Host "Deleted existing GitLab release $env:CI_COMMIT_TAG"
      } catch {
        Write-Host "No existing GitLab release to delete - continuing"
      }

      # Create GitLab release (no assets in body - attach separately to avoid Bad Request)
      $glPayload = @{
        tag_name    = $env:CI_COMMIT_TAG
        name        = "PandaTools $env:CI_COMMIT_TAG"
        description = $releaseNotes
      } | ConvertTo-Json -Depth 3

      Invoke-RestMethod `
        -Uri         "$apiBase/releases" `
        -Method      Post `
        -Headers     $headers `
        -Body        $glPayload `
        -ContentType "application/json"

      Write-Host "GitLab release created: $env:CI_COMMIT_TAG"

      # Attach installer asset link separately via release links API
      $linkPayload = @{
        name      = $exeName
        url       = $exeUrl
        link_type = "package"
      } | ConvertTo-Json -Depth 2

      Invoke-RestMethod `
        -Uri         "$apiBase/releases/$($env:CI_COMMIT_TAG)/assets/links" `
        -Method      Post `
        -Headers     $headers `
        -Body        $linkPayload `
        -ContentType "application/json"

      Write-Host "Asset link attached: $exeUrl"


  rules:
    - if: $CI_COMMIT_TAG